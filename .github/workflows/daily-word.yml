name: Generate Daily Vocabulary Word

on:
  schedule:
    # Runs at 9:00 AM UTC every day
    - cron: '0 9 * * *'
  # Allows you to run this workflow manually from the GitHub Actions tab
  workflow_dispatch:

# Grant permission to push commits back to the repo
permissions:
  contents: write

jobs:
  generate:
    name: Generate & Commit New Word
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN to push the commit
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate today's vocabulary word
        run: npm run generate

      - name: Commit and push new word
        run: |
          git config --global user.name "ambreenzubari"
          git config --global user.email "ambreenzubari04@gmail.com"

          git add data/words.json

          # Only commit if there are actual changes (idempotent)
          if git diff --staged --quiet; then
            echo "No changes to commit — word already existed for today."
            exit 0
          fi

          # Extract word name for the commit message
          WORD=$(node -e "const w=require('./data/words.json');process.stdout.write(w[0].word)")
          DATE=$(date +'%Y-%m-%d')

          git commit -m "📚 Daily word: ${WORD} (${DATE})"
          git push

          echo ""
          echo "✅ Committed and pushed: ${WORD}"
          echo "   Vercel will now auto-deploy the updated website."
